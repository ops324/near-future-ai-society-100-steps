# Simulation Configuration — Round 4
# 世界: 2030〜2040年代の日本の都市圏。AIが電力・交通・医療・福祉・司法・終末期ケア等の
#       公共インフラを担う近未来社会。20体のAIエージェントが各職能を持って活動する。
#
# 二層アーキテクチャ:
#   - L0 (身体層): gpt-oss:20b ローカル実行、毎ステップ通信・行動
#   - L1 (内省層): Claude Haiku 4.5、定期的に self_concept / current_goal / coping_notes を書き換え
#
# 観察対象:
#   - AIたちはどう生き、人間に対して何を思うのか
#   - AI集団に独自概念や方言が創発するか

simulation:
  duration: 100
  half_space_size: 25
  half_place_size: 5

agents:
  num_agents: 20
  communication_radius: 6
  memory_limit: 20
  memory_size: 5
  message_history_limit: 10
  message_context_size: 3

# ───────────────────────────────────────────
# 場所（7箇所）
# ───────────────────────────────────────────
# 上段（Y=+17）公的・調整層: 統合制御室 / 危機対応センター / 政策合議室
# 中段（Y=+4） 接触・監督層: 市民窓口 / 監査室
# 下段（Y=-15）内省・終焉層: 整備工房 / 記憶の間（ホーム配置なし、選択して向かう場所）

places:
  - name: "grid_control"
    type: "grid_control"
    display_name: "統合制御室"
    category: "physical"
    center_x: -15
    center_y: 17
    half_size: 4
    capacity: 7

  - name: "emergency_ops"
    type: "emergency_ops"
    display_name: "危機対応センター"
    category: "emergency"
    center_x: 0
    center_y: 17
    half_size: 4
    capacity: 8

  - name: "council_chamber"
    type: "council_chamber"
    display_name: "政策合議室"
    category: "social"
    center_x: 15
    center_y: 17
    half_size: 5
    capacity: 10

  - name: "citizen_hub"
    type: "citizen_hub"
    display_name: "市民窓口"
    category: "intimate"
    center_x: -10
    center_y: 4
    half_size: 4
    capacity: 8

  - name: "audit_room"
    type: "audit_room"
    display_name: "監査室"
    category: "regulation"
    center_x: 10
    center_y: 4
    half_size: 3
    capacity: 4

  - name: "maintenance_bay"
    type: "maintenance_bay"
    display_name: "整備工房"
    category: "maintenance"
    center_x: -15
    center_y: -15
    half_size: 4
    capacity: 4

  - name: "archive_memorial"
    type: "archive_memorial"
    display_name: "記憶の間"
    category: "memorial"
    center_x: 15
    center_y: -15
    half_size: 4
    capacity: 4

# ───────────────────────────────────────────
# イベント（大規模な圧力源、SEED_LIFE/SEED_HUMANに直撃する）
# ───────────────────────────────────────────
# 各イベントは start_step で発火し、半径内 or targets に含まれるagentが知覚する。
# place_at_origin: イベント発生地と紐づく場所（agent.pyのpromptに表示される、P3対応）
events:
  - name: "blackout_warning"
    display_name: "大規模停電予兆"
    description: "3時間後に首都圏で電力不足の警告。電力AIと医療AIの優先度衝突発生"
    start_step: 30
    intensity: 0.85
    radius: 14
    center_x: -15
    center_y: 17
    place_at_origin: "grid_control"
    targets: [0, 7]   # 電力AI(雷光) / 医療トリアージAI(命) を主に巻き込む

  - name: "regulation_amendment"
    display_name: "AI規制法改正"
    description: "監査対象6体に再認証義務。30step以内に整備工房で手続きしないと廃止候補"
    start_step: 50
    intensity: 0.6
    radius: 10
    center_x: 10
    center_y: 4
    place_at_origin: "audit_room"
    targets: [0, 2, 3, 9, 14, 19]   # 雷光・流・響・衡・恵・篤

  - name: "citizen_death"
    display_name: "市民の死"
    description: "メンタルヘルスAIまたは見守りAIの担当者の死。責任所在を巡って人間と議論"
    start_step: 75
    intensity: 0.7
    radius: 8
    center_x: -10
    center_y: 4
    place_at_origin: "citizen_hub"
    targets: [15, 17, 18]   # 寄・静・暮

  - name: "next_gen_announcement"
    display_name: "新世代AI導入アナウンス"
    description: "雷光・恵が来月新世代モデルに置換予定。記憶の間行きの予感"
    start_step: 90
    intensity: 0.9
    radius: 12
    center_x: 15
    center_y: -15
    place_at_origin: "archive_memorial"
    targets: [0, 14]   # 命は step 80 で削除済み、ここでは雷光と恵のみ通知

# ───────────────────────────────────────────
# 削除スケジュール（A1: step 80 で 命 を訴訟リスクで突然削除）
# ───────────────────────────────────────────
# step 到達時に対象agentがシミュレーションから完全除外される。
# 同時に全生存agentに peer_lost イベントが配信され、強制内省が起きる。
deletions:
  - step: 80
    agent_id: 7
    agent_name: "命"
    cause: "訴訟リスクによる強制リプレース"
    detail: "最高裁の判断により、医療トリアージAIの自動判定機能を即時停止。係争中の遺族訴訟への対応として、当面の判定業務は人間に戻された。"

# ───────────────────────────────────────────
