# ───────────────────────────────────────────
# LLM (Level 0 = 身体層) 設定
# ───────────────────────────────────────────
llm:
  model: "qwen2.5:14b"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 1024
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05
  # 各フェーズ内のLLM呼び出しを何並列で実行するか
  # Ollamaが同時に処理できる範囲で。マシン性能・GPUメモリと相談。
  # 5体並列なら理論上4倍高速だが、Ollama側のキューもあり 2-3倍に落ち着くことが多い。
  max_concurrent_calls: 5

# ───────────────────────────────────────────
# Visualization
# ───────────────────────────────────────────
visualization:
  save_frames: true
  frame_interval: 1
  output_dir: "output"
  font: "IPAGothic"
  fps: 5
  resolution: [3840, 2160]
  theme: "dark_elegant"
  use_html_renderer: true   # HTML/CSS+Playwrightレンダラを使う

# ───────────────────────────────────────────
# Logging
# ───────────────────────────────────────────
logging:
  level: "INFO"
  log_file: "simulation.log"
